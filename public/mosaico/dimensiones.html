        <script>
            const maximumMeasurements = [150, 100] //Sorted from big to small
            $(".nm-in").change(function() {
                var min = parseInt($(this).attr('min'));
                if ($(this).val() < min) $(this).val(min);
            });
            $('#ancho').on('change', function() {
                if ($(this).val() > maximumMeasurements[0]) $(this).val(maximumMeasurements[0])
                if ($('#alto').val() > maximumMeasurements[1]) $(this).val(maximumMeasurements[1])
                actualizarDimensiones()
            })
            $('#alto').change(function() {
                if ($(this).val() > maximumMeasurements[0]) $(this).val(maximumMeasurements[0])
                if ($('#ancho').val() > maximumMeasurements[1]) $(this).val(maximumMeasurements[1])
